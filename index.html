<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة لـ رورو 🌸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. شاشة قفل الباسورد -->
    <div id="lock-screen" class="screen">
        <div class="lock-card">
            <div class="flower-icon">🌸✨</div>
            <h2>مرحباً بكِ يا رورو</h2>
            <p>أدخلي كلمة السر لفتح المفاجأة 😉</p>
            <input type="password" id="password-input" placeholder="اكتبِ كلمة السر هنا...">
            <button onclick="checkPassword()" class="btn">افتحي البوابة ✨</button>
            <p id="error-msg" class="error-text"></p>
        </div>
    </div>

    <!-- 2. الشاشة الرئيسية بعد فتح القفل -->
    <div id="main-screen" class="screen hidden">
        <header>
            <h1 class="fade-in">اختارِ كارت واحد فقط يا رورو! 🤔🌸</h1>
            <p class="fade-in">خلف كل كارت يوجد سؤال خاص لكِ...</p>
        </header>

        <!-- منطقة الكروت -->
        <div class="cards-container" id="cards-container">
            <!-- الكارت الأول -->
            <div class="card" onclick="selectCard(this, 'ما هي أكثر صفة تحبينها في سيفو؟ 🥺❤️')">
                <div class="card-inner">
                    <div class="card-front">🌸 الكارت الأول</div>
                </div>
            </div>

            <!-- الكارت الثاني -->
            <div class="card" onclick="selectCard(this, 'ما هي أجمل ذكرى تجمعنا معاً ولا يمكن أن تنسيها؟ ☕✨')">
                <div class="card-inner">
                    <div class="card-front">💎 الكارت الثاني</div>
                </div>
            </div>

            <!-- الكارت الثالث -->
            <div class="card" onclick="selectCard(this, 'لو كان بإمكانك السفر معي الآن، إلى أين سنذهب؟ ✈️🌍')">
                <div class="card-inner">
                    <div class="card-front">🎀 الكارت الثالث</div>
                </div>
            </div>
        </div>

        <!-- منطقة إظهار السؤال المختار والعداد -->
        <div id="question-area" class="hidden">
            <div class="selected-card-display">
                <h2 id="display-question"></h2>
                <div id="timer-box">
                    <span id="countdown">10</span> ثوانٍ متبقية للقراءة...
                </div>
            </div>
        </div>

        <!-- الشاشة النهائية بعد انتهاء الوقت -->
        <div id="final-screen" class="hidden">
            <div class="final-card">
                <div class="heart-icon">💖</div>
                <h2>انتهى الوقت! 🥰</h2>
                <h3 class="highlight-text">ردي على سيفو بإجابة السؤال دلوقتي 📱✨</h3>
            </div>
        </div>
    </div>

    <!-- إضافة الجافا سكريبت للتحكم بالتفاعلات -->
    <script>
        // 1. التحقق من كلمة السر
        function checkPassword() {
            const password = document.getElementById('password-input').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            // كلمة السر roro أو Roro
            if (password.toLowerCase() === 'roro') {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
            } else {
                errorMsg.innerText = "كلمة السر غير صحيحة يا جميلة! جربي تاني 🌸";
                errorMsg.style.display = "block";
            }
        }

        // 2. اختيار الكارت وعرض السؤال
        function selectCard(cardElement, questionText) {
            const container = document.getElementById('cards-container');
            const cards = document.querySelectorAll('.card');
            
            // إخفاء باقي الكروت غير المختارة بتأثير حركي
            cards.forEach(card => {
                if (card !== cardElement) {
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.8)';
                    setTimeout(() => card.style.display = 'none', 500);
                }
            });

            // تمييز الكارت المختار وتكبيره قليلاً
            cardElement.classList.add('selected');
            
            // إظهار السؤال والبدء في العد التنازلي
            setTimeout(() => {
                container.style.display = 'none';
                document.getElementById('question-area').classList.remove('hidden');
                document.getElementById('display-question').innerText = questionText;
                
                startTimer();
            }, 600);
        }

        // 3. العداد التنازلي (10 ثواني)
        function startTimer() {
            let timeLeft = 10;
            const countdownEl = document.getElementById('countdown');
            
            const timerInterval = setInterval(() => {
                timeLeft--;
                countdownEl.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // إخفاء الكروت تماماً وإظهار الرسالة النهائية لسيفو
                    document.getElementById('question-area').classList.add('hidden');
                    document.getElementById('final-screen').classList.remove('hidden');
                }
            }, 1000);
        }
    </script>
</body>
</html>
